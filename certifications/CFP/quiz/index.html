<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f766e">
<title>CFP 弱点克服クイズ（ライフ／不動産）</title>
<style>
  :root{
    --bg:#0f172a; --card:#1e293b; --card2:#273449; --txt:#e2e8f0; --sub:#94a3b8;
    --teal:#14b8a6; --teal-d:#0f766e; --ok:#22c55e; --ng:#ef4444; --amber:#f59e0b;
    --line:#334155;
  }
  *{box-sizing:border-box}
  body{margin:0; font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
    background:var(--bg); color:var(--txt); line-height:1.7; -webkit-text-size-adjust:100%}
  .wrap{max-width:720px; margin:0 auto; padding:16px 14px 48px}
  header h1{font-size:20px; margin:8px 0 2px}
  header p{color:var(--sub); font-size:13px; margin:0 0 10px}
  .card{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:18px 16px; margin:14px 0}
  .btn{display:block; width:100%; text-align:left; background:var(--card2); color:var(--txt);
    border:1px solid var(--line); border-radius:10px; padding:13px 14px; margin:9px 0;
    font-size:15px; cursor:pointer; transition:.12s; -webkit-tap-highlight-color:transparent}
  .btn:hover{border-color:var(--teal)}
  .btn .num{display:inline-block; width:26px; height:26px; line-height:26px; text-align:center;
    background:#0b1220; border-radius:7px; margin-right:10px; font-weight:700; color:var(--teal); font-size:13px}
  .btn.ok{background:rgba(34,197,94,.16); border-color:var(--ok)}
  .btn.ng{background:rgba(239,68,68,.16); border-color:var(--ng)}
  .btn.ok .num{color:var(--ok)} .btn.ng .num{color:var(--ng)}
  .btn:disabled{cursor:default}
  .primary{background:var(--teal-d); border-color:var(--teal); color:#fff; text-align:center; font-weight:700}
  .primary:hover{background:var(--teal)}
  .ghost{background:transparent; text-align:center}
  .row{display:flex; gap:10px; flex-wrap:wrap}
  .row .btn{flex:1; min-width:130px}
  .meta{display:flex; justify-content:space-between; align-items:center; font-size:13px; color:var(--sub); margin-bottom:6px}
  .tier{font-size:11px; font-weight:700; padding:2px 9px; border-radius:20px}
  .t1{background:rgba(239,68,68,.18); color:#fca5a5}
  .t2{background:rgba(245,158,11,.18); color:#fcd34d}
  .t3{background:rgba(34,197,94,.18); color:#86efac}
  .qtext{font-size:16px; font-weight:600; margin:6px 0 12px}
  .bar{height:7px; background:#0b1220; border-radius:6px; overflow:hidden; margin:4px 0 14px}
  .bar>i{display:block; height:100%; background:var(--teal); width:0; transition:.3s}
  .fb{border-radius:10px; padding:13px 14px; margin-top:6px; font-size:14px}
  .fb.ok{background:rgba(34,197,94,.12); border:1px solid var(--ok)}
  .fb.ng{background:rgba(239,68,68,.12); border:1px solid var(--ng)}
  .fb .src{color:var(--sub); font-size:12px; margin-top:6px}
  .big{font-size:46px; font-weight:800; text-align:center; margin:4px 0}
  .center{text-align:center}
  .rev{border-left:3px solid var(--ng); padding:8px 0 8px 12px; margin:12px 0}
  .rev .q{font-weight:600; font-size:14px}
  .rev .a{font-size:13px; color:var(--sub); margin-top:4px}
  .rev .a .you{color:#fca5a5} .rev .a .cor{color:#86efac}
  .chip{display:inline-block; font-size:11px; color:var(--sub); border:1px solid var(--line); border-radius:20px; padding:2px 9px; margin:2px 6px 2px 0}
  .subcard{cursor:pointer}
  .subcard h2{margin:0 0 4px; font-size:18px}
  footer{color:var(--sub); font-size:12px; text-align:center; margin-top:24px}
  a{color:var(--teal)}
  .badge{background:rgba(239,68,68,.2); color:#fca5a5; font-size:11px; font-weight:700; padding:2px 8px; border-radius:20px; margin-left:6px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>CFP 弱点克服クイズ</h1>
    <p>ライフ／不動産 ・ 1回30問 ・ ティア優先＋間違えた問題の優先度UP＋累積苦手出題</p>
  </header>
  <div id="app"></div>
  <footer>個人学習用 · 日本FP協会過去問／FPK模試の論点を基に作成 · 制度は受験年度の最新を要確認</footer>
</div>

<script>
/* ===== 設定 ===== */
const SESSION_SIZE = 30;          // 1回の出題数
const TIER_BASE = {1:5, 2:3, 3:2}; // ティア基礎重み（第1ティアほど高優先）
const MISS_BOOST = 2;             // 間違えた回数1回につき重みに加算する倍率
const TIER_LABEL = {1:"第1ティア 最優先", 2:"第2ティア 重要", 3:"第3ティア 定着確認"};
const TIER_CLASS = {1:"t1",2:"t2",3:"t3"};

/* ===== 問題データ =====
   id: 永続キー（localStorageの苦手記録に使用） t: ティア
   q: 問題 c: 選択肢 a: 正解index(0始まり) e: 解説 s: 出典/論点 */
const DATA = {
"ライフ":[
 {id:"L1",t:1,q:"iDeCo（個人型確定拠出年金）の老齢給付金を一時金で受け取った場合の所得区分は？",c:["一時所得","退職所得","雑所得","給与所得"],a:1,e:"一時金＝退職所得（退職所得控除）／年金＝雑所得（公的年金等控除）。",s:"継続弱点 第1回→第2回→模試4"},
 {id:"L2",t:1,q:"出生時育児休業給付金の給付率は？",c:["50%","60%","67%","80%"],a:2,e:"賃金日額×支給日数(上限28日)×67%。給付率の掛け忘れに注意。",s:"2025-2 Q20"},
 {id:"L3",t:1,q:"老齢基礎年金を繰上げ受給した場合の付加年金の扱いは？",c:["減額されず満額支給","老齢基礎年金と同率で減額","付加年金は支給されない","0.7%/月で増額"],a:1,e:"付加年金も繰上げ0.4%/月・繰下げ0.7%/月で同率に増減する。",s:"2025-2 Q35"},
 {id:"L4",t:1,q:"障害厚生年金と老齢基礎年金の併給について正しいのは？",c:["年齢にかかわらず併給できる","65歳以上なら併給できる","65歳以上であっても併給できない","60歳以上で併給できる"],a:2,e:"「障害厚生＋老齢基礎」は65歳以上でも不可。65歳併給可は①老齢基礎+遺族厚生②障害基礎+老齢厚生③障害基礎+遺族厚生。",s:"2025-2 Q40"},
 {id:"L5",t:1,q:"高年齢雇用継続給付の最大支給率（2025年4月以降）は？",c:["10%","15%","25%","75%"],a:0,e:"2025/4から最大10%（従来15%）。賃金が60歳時の75%未満に低下で支給。",s:"2025-2 Q22"},
 {id:"L6",t:1,q:"育児休業給付金の受給要件として正しいのは？",c:["開始前1年間にみなし被保険者期間6ヶ月以上","開始前2年間にみなし被保険者期間12ヶ月以上","開始前2年間にみなし被保険者期間6ヶ月以上","開始前1年間にみなし被保険者期間12ヶ月以上"],a:1,e:"育休開始前2年間に通算12ヶ月以上。「1年で6ヶ月」は基本手当の特定受給資格者の数字。",s:"2025-2 Q21"},
 {id:"L7",t:1,q:"雇用保険の基本手当の賃金日額の算定基礎に含めるものは？",c:["賞与","退職金","賃金支払基礎日数11日未満の月の賃金","直近6ヶ月（11日以上の月）の毎月の賃金"],a:3,e:"直近6ヶ月（11日未満の月は除外）の毎月の賃金÷180。賞与・退職金は不算入。",s:"2025-2 Q19"},
 {id:"L58",t:1,q:"雇用保険の基本手当の賃金日額を求めるとき、賃金総額を割る分母（割る数）は？",c:["実出勤日数の合計","180（固定値・6ヶ月×30）","直前6ヶ月の暦日数","対象期間の労働日数"],a:1,e:"賃金日額＝直近6ヶ月（11日未満月除外）の賃金総額÷180（固定値）。✗出勤日数で割るとWが過大→上限額に張り付く。180は『暦日数』ではない（暦の総日数で割るのは労災の給付基礎日額）。手順：①賞与退職金除外②11日未満月除外③÷180。",s:"2025-2 Q19(2周目・分母取り違え)★継続失点"},
 {id:"L8",t:1,q:"65歳時点の老齢厚生年金の額で計上を忘れやすい要素は？",c:["加給年金額","経過的加算","振替加算","付加年金"],a:1,e:"老齢給付＝老齢基礎＋報酬比例＋経過的加算（＋条件次第で加給/振替）。",s:"模試4 Q36"},
 {id:"L9",t:1,q:"高額療養費の世帯合算で、限度額式「80,100＋(総医療費−267,000)×1%」の総医療費は？",c:["70歳未満の本人の医療費のみ","合算対象となる世帯全体の医療費（70歳以上分も含む）","入院分のみ","70歳以上分のみ"],a:1,e:"総医療費は合算対象の世帯全体（70歳以上分も含む）。本人分だけでは限度額を過小評価。",s:"模試4 Q34"},
 {id:"L10",t:1,q:"国民健康保険料の介護分（介護納付金分）を負担するのは？",c:["世帯全員","第1号被保険者（65歳以上）","第2号被保険者（40歳以上65歳未満）","40歳未満の被保険者"],a:2,e:"介護分は第2号（40-64歳）のみ。未就学児は均等割5割軽減。",s:"2025-2 Q26"},
 {id:"L11",t:2,q:"協会けんぽの任意継続被保険者の標準報酬月額の決め方は？",c:["喪失前1年間の平均","喪失時の標準報酬月額と全被保険者平均の、いずれか低い方","喪失時の標準報酬月額","全被保険者の平均標準報酬月額"],a:1,e:"①喪失時の標準報酬月額と②前年9/30の全被保険者平均の、いずれか低い方。",s:"模試4 Q25"},
 {id:"L12",t:2,q:"被保険者に生計維持されていた者がいない場合、埋葬を行った人へ支給されるのは？",c:["一律5万円の埋葬料","実費（上限5万円）の埋葬費","一律10万円の埋葬料","支給されない"],a:1,e:"埋葬料＝一律5万円（生計維持者あり）／埋葬費＝実費・上限5万円（なし）。",s:"模試4 Q31"},
 {id:"L13",t:2,q:"国民年金第1号被保険者の産前産後期間の保険料免除の扱いは？",c:["全額免除期間（老齢基礎は1/2反映）","保険料納付済期間（老齢基礎に満額反映）","半額免除期間","学生納付特例と同じ猶予"],a:1,e:"「納付済期間」として満額反映。出産月の前月から4ヶ月（多胎は3ヶ月前から6ヶ月）。",s:"模試4 Q27"},
 {id:"L14",t:2,q:"協会けんぽの任意継続被保険者の申請期限は？",c:["喪失日から14日以内","喪失日から20日以内","喪失日から30日以内","喪失日の翌月10日まで"],a:1,e:"継続2ヶ月以上＋20日以内申請＋最長2年＋全額自己負担、をセットで。",s:"2025-1 Q29"},
 {id:"L15",t:2,q:"健康保険の被扶養者の収入要件（60歳未満・障害者でない）は？",c:["年収103万円未満","年収130万円未満かつ被保険者の年収の1/2未満","年収150万円未満","年収180万円未満"],a:1,e:"130万円未満（60歳以上/障害者は180万円未満）かつ被保険者の1/2未満。",s:"2025-1 Q28"},
 {id:"L16",t:2,q:"介護保険の第2号被保険者が給付を受けられるのは？",c:["原因を問わず要介護・要支援になったとき","特定疾病（16種類）が原因のとき","65歳に達したとき","交通事故で要介護になったとき"],a:1,e:"第2号（40-64歳）は特定疾病（16種）が原因のときだけ。",s:"2025-1 Q26"},
 {id:"L17",t:2,q:"健康保険・厚生年金の適用事業所に関して正しいのは？",c:["美容業の個人事業所は5人以上で強制適用","税理士事務所（士業）の個人事業所は5人以上で強制適用","法人は従業員5人以上でないと適用事業所にならない","個人事業所は業種を問わず5人以上で強制適用"],a:1,e:"士業は2022/10から5人以上で強制適用。美容業は非適用業種。法人は1人でも強制適用。",s:"2025-2 Q29"},
 {id:"L18",t:1,q:"健康保険の資格喪失後、被扶養者であった者が3ヶ月以内に死亡した場合は？",c:["家族埋葬料が支給される","家族埋葬料は支給されない","埋葬料が支給される","埋葬費が支給される"],a:1,e:"喪失後は被扶養者の概念がないため家族埋葬料は出ない。喪失後の給付は本人ベース(出産育児一時金も同様)。",s:"2025-2 Q32 / 2025-1 Q32(継続失点)"},
 {id:"L19",t:2,q:"傷病手当金の支給期間（2022年改正後）は？",c:["支給開始から1年6ヶ月","通算1年6ヶ月","支給開始から1年","通算2年"],a:1,e:"通算1年6ヶ月。日額は標準報酬日額の2/3、連続3日待期後4日目から。",s:"2025-1"},
 {id:"L20",t:2,q:"出産育児一時金の額（2023年4月以降）は？",c:["42万円","50万円","48万円","39万円"],a:1,e:"2023年4月から1児につき50万円。",s:"2025-1"},
 {id:"L21",t:3,q:"在職定時改定について正しいのは？",c:["基準日9月1日・10月分から改定","基準日4月1日・5月分から改定","退職するまで改定されない","基準日9月1日・9月分から改定"],a:0,e:"65歳以上の在職中、基準日9/1で再計算し10月分（12月支払）から改定（2022導入）。",s:"模試41"},
 {id:"L22",t:3,q:"老齢年金の繰上げ・繰下げの減額率・増額率は？",c:["繰上0.5%/月・繰下0.7%/月","繰上0.4%/月・繰下0.7%/月","繰上0.4%/月・繰下0.5%/月","繰上0.7%/月・繰下0.4%/月"],a:1,e:"繰上0.4%/月（2022/4〜）・繰下0.7%/月（最大75歳84%増）。受給資格期間10年。",s:"2025-1"},
 {id:"L23",t:3,q:"一般教育訓練給付金の給付率と上限額は？",c:["20%・上限10万円","40%・上限20万円","50%・上限40万円","30%・上限20万円"],a:0,e:"一般＝20%・上限10万円。離職後1年以内に受講開始。",s:"2025-1 Q15"},
 {id:"L24",t:3,q:"介護休業給付の対象家族に含まれないのは？",c:["配偶者の父母","祖父母","配偶者の祖父母","孫"],a:2,e:"対象家族に「配偶者の祖父母」は含まない。給付は67%・通算93日・3回まで。",s:"2025-2 Q25"},
 {id:"L25",t:3,q:"労災保険の休業補償給付の支給開始日と給付率は？",c:["初日から60%","4日目から60%","4日目から80%","初日から80%"],a:1,e:"4日目から給付基礎日額の60%（＋特別支給金20%＝実質80%）。最初の3日は事業主補償。",s:"2025-1 Q19"},
 {id:"L26",t:1,q:"ねんきん定期便が封書で送付される節目年齢は？",c:["30・40・50歳","35・45・59歳","40・50・59歳","35・45・55歳"],a:1,e:"節目年齢35・45・59歳は封書（詳細版）。通常は誕生月にはがき。見込額に加給年金額は反映されない（正肢）。ネット登録方法は複数あり『2つに限られる』は誤り。",s:"2025-2 Q41(2周目も誤答)★継続失点"},
 {id:"L27",t:3,q:"小規模企業共済で掛金を途中で増額していた場合の共済金の計算は？",c:["総納付月数に対応する共済金額で一括計算","増額分はその時点からの納付月数で口数別に算出し合算","最終の掛金月額で全期間を計算","増額前の掛金月額で全期間を計算"],a:1,e:"増額部分はその時点からの納付月数で口数別に算出して合算（階層方式）。",s:"2025-2 Q44"},
 {id:"L28",t:3,q:"任意後見契約の解除について正しいのは？",c:["監督人選任前は家庭裁判所の許可が必要","監督人選任前は公証人の認証を受けた書面で自由に解除できる","監督人選任後は本人の意思のみで解除できる","任意後見受任者は本人の死亡届の届出人になれない"],a:1,e:"監督人選任「前」＝認証書面で自由／「後」＝家裁許可。受任者も死亡届の届出人になれる（2020改正）。",s:"2025-1 Q47 / 2025-2 Q48"},
 {id:"L29",t:3,q:"サ高住・終身建物賃貸借の入居者本人の年齢要件は？",c:["65歳以上","60歳以上（または60歳未満の要介護・要支援認定者）","70歳以上","年齢要件はない"],a:1,e:"サ高住は60歳以上または要介護等の認定者。終身建物賃貸借も賃借人は60歳以上、解約は知事承認要。",s:"2025-2 Q49,Q50"},
 {id:"L30",t:3,q:"2025年新設の給付金の率の組み合わせとして正しいのは？",c:["出生後休業支援13%・育児時短10%","出生後休業支援10%・育児時短13%","出生後休業支援67%・育児時短10%","出生後休業支援13%・育児時短20%"],a:0,e:"出生後休業支援給付金13%（出生時育休67%＋13%＝80%）、育児時短就業給付金10%。",s:"2025-2 Q21"},
 {id:"L31",t:3,q:"目標額のために毎年積み立てる額を求める係数は？",c:["減債基金係数","資本回収係数","年金現価係数","年金終価係数"],a:0,e:"毎年いくら積み立てる？＝減債基金係数。目標額×減債基金係数。",s:"係数"},
 {id:"L32",t:3,q:"元本を一定期間で取り崩す毎年の受取額（ローン返済額）を求める係数は？",c:["減債基金係数","資本回収係数","現価係数","終価係数"],a:1,e:"毎年いくら受け取れる/返す？＝資本回収係数。借入額×資本回収係数＝毎年返済額。",s:"係数"},
 {id:"L33",t:3,q:"キャッシュフロー表の貯蓄残高の計算式は？",c:["前年残高＋当年収支","前年残高×(1+運用率)±当年収支","前年残高×(1+変動率)","当年収入−当年支出"],a:1,e:"貯蓄残高＝前年残高×(1+運用率)±当年収支。将来値＝現在値×(1+変動率)ⁿ と区別。",s:"CF表"},
 {id:"L34",t:1,q:"在職老齢年金の支給停止調整額（2026年度）は？",c:["48万円","50万円","51万円","65万円"],a:3,e:"2024=50万→2025=51万→2026=65万に引上げ。式は(基本月額+総報酬月額相当額−調整額)÷2。受験年度の額を確認。",s:"改正論点"},
 {id:"L35",t:2,q:"自筆証書遺言について正しいのは？",c:["全文をパソコンで作成できる","財産目録はパソコン作成可で、法務局保管制度を使えば検認不要","証人2人が必要","常に家庭裁判所の検認が必要"],a:1,e:"本文は自書、財産目録のみPC可（各頁署名押印）。法務局保管制度なら検認不要。公正証書遺言も検認不要。",s:"2025-1 Q48"},
 {id:"L36",t:3,q:"障害者雇用納付金の額（1人当たり月額）は？",c:["29,000円","50,000円","13,100円","40,600円"],a:1,e:"未達成1人当たり月5万円の納付金。超過1人当たり月29,000円は調整金。端数は切り捨て。",s:"2025-2 Q3"},
 {id:"L37",t:2,q:"派遣労働者に適用される最低賃金は？",c:["派遣元の事業場所在地の地域別最低賃金","派遣先の事業場所在地の地域別最低賃金","全国一律の最低賃金","派遣元と派遣先の高い方"],a:1,e:"派遣労働者は派遣先の事業場所在地の地域別（特定）最低賃金が適用される。",s:"2025-2 Q17"},
 {id:"L38",t:2,q:"労働安全衛生法で、月80時間超の時間外労働者への医師の面接指導は？",c:["本人の希望の有無にかかわらず実施","労働者本人の申出により実施","産業医が必要と認めたときのみ","100時間超で初めて義務"],a:1,e:"80時間超は労働者本人の申出により面接指導。深夜業健診は配置替え時＋6ヶ月以内ごと。",s:"2025-2 Q24"},
 {id:"L39",t:3,q:"iDeCoの第1号被保険者（自営業）の拠出限度額（月額）は？",c:["23,000円","20,000円","68,000円","12,000円"],a:2,e:"第1号は月68,000円（国民年金基金・付加保険料と合算枠）。第3号は23,000円。",s:"iDeCo"},
 {id:"L40",t:3,q:"労働基準法の割増賃金率（法定休日労働）は？",c:["25%以上","35%以上","50%以上","60%以上"],a:1,e:"法定休日35%以上。時間外25%・深夜25%・月60時間超の時間外50%以上。",s:"労基"},
 {id:"L41",t:1,q:"日本学生支援機構の貸与奨学金の減額返還制度を利用できる上限期間は？",c:["通算10年(120ヶ月)","通算15年(180ヶ月)","通算20年(240ヶ月)","制限なし"],a:1,e:"減額返還は通算15年(180ヶ月)まで(返還月額を1/2・1/3等に減額し期間延長)。「10年/120ヶ月」は誤り。",s:"2025-1 Q12(継続失点)"},
 {id:"L42",t:1,q:"雇用保険の一般教育訓練給付金について正しいのは？",c:["修了後に資格取得・就職すると追加給付がある","資格取得・就職による追加給付はない","給付率は50%である","上限は40万円である"],a:1,e:"一般教育訓練は給付率20%・上限10万円のみで追加給付なし。資格取得+就職での追加給付があるのは専門実践教育訓練(最大70/80%)。",s:"2025-1 Q15(継続失点)"},
 {id:"L43",t:1,q:"労働基準法上、使用者が与えるべき休日(法定休日)は？",c:["毎週2回または4週8日以上","毎週1回または4週4日以上","毎週1回のみ","4週6日以上"],a:1,e:"法定休日は毎週1回または4週を通じ4日以上。「週2回/4週8日」は誤り。法定休日労働の割増は35%以上。",s:"2025-1 Q17(継続失点)"},
 {id:"L44",t:1,q:"協会けんぽの任意継続被保険者について正しいのは？",c:["傷病手当金・出産手当金が支給される","資格喪失後の継続給付を除き傷病手当金・出産手当金は支給されない","保険料未納は翌月1日に資格喪失","加入要件は継続1年以上"],a:1,e:"任意継続は原則傷病・出産手当金が出ない(継続給付除く)。保険料を納付期日までに納めないと「翌日」に資格喪失(翌月1日でない)。加入要件は継続2ヶ月以上。",s:"2025-1 Q29(継続失点)"},
 {id:"L45",t:1,q:"離婚時の合意分割で、一方が標準報酬改定に必要な情報提供を請求した場合は？",c:["婚姻期間中・離婚後を問わず他方に通知されない","離婚後に請求すると他方に通知される","常に他方に通知される","通知は一切行われない"],a:1,e:"離婚後に一方が情報提供を請求すると他方に通知される(婚姻期間中は通知されない)。合意分割は2分の1上限、合意できなければ家裁が按分割合を定める。",s:"2025-1 Q41(継続失点)"},
 {id:"L46",t:1,q:"確定給付企業年金(DB)で、規約に定められないものは？",c:["老齢給付金の一部を一時金で支給","脱退一時金の要件として3年を超える加入者期間","老齢給付金の支給開始を60歳以上に","脱退一時金の要件として3年以下の加入者期間"],a:1,e:"脱退一時金の要件は「3年以下」の加入者期間まで(3年超の要件は不可)。老齢給付金は20年を超える加入期間を要件にできない。50歳未満への支給規約も不可。",s:"2025-1 Q42(継続失点・DB/DC弱点)"},
 {id:"L47",t:1,q:"間接法による営業キャッシュフローで、CFをマイナス要因にするのは？",c:["売上債権の減少","棚卸資産の増加・仕入債務の減少","減価償却費","仕入債務の増加"],a:1,e:"資産(売掛金・棚卸資産)の増加はCFマイナス、負債(買掛金)の減少もCFマイナス。逆はプラス。減価償却費は非現金支出でプラス加算。",s:"2025-1 Q46(継続失点)"},
 {id:"L48",t:1,q:"自筆証書遺言書保管制度について正しいのは？",c:["相続放棄した者は遺言書の閲覧を請求できない","相続放棄した者も関係相続人等として閲覧を請求できる","本人が出頭できなくても代理人が申請できる","封をして保管申請する"],a:1,e:"遺言者の死後、相続放棄した者も「関係相続人等」に含まれ閲覧・交付請求できる。保管申請は本人が自ら出頭(代理不可)、無封で提出。",s:"2025-1 Q48(継続失点)"},
 {id:"L49",t:1,q:"介護老人福祉施設(特別養護老人ホーム)の入所対象は原則として？",c:["要支援2以上","要介護1以上","要介護2以上","要介護3以上"],a:3,e:"特養は原則要介護3以上(2015年改正)。老健・介護医療院は要介護1以上。グループホームは要支援2または要介護1以上の認知症の人。",s:"2025-1 Q49(継続失点)"},
 {id:"L50",t:2,q:"第1号被保険者(本人非課税・世帯に課税者あり)の介護保険料所得段階で、課税年金収入額+その他合計所得が80万円を超える場合は？",c:["第4段階(基準額×0.90)","第5段階(基準額×1.00)","第3段階","第6段階"],a:1,e:"本人非課税で世帯に課税者がいる場合、課税年金収入額+その他合計所得が80万円以下=第4段階(×0.90)、80万円超=第5段階(×1.00、基準額)。境界80万の判定に注意。",s:"2025-1 Q24(後退)"},
 {id:"L51",t:2,q:"高額療養費の多数回該当(直近12ヶ月の受給回数による)について正しいのは？",c:["3回目から限度額が下がる","4回目から限度額が93,000円(区分ウ)に下がる","回数に関係なく一定","12回目から下がる"],a:1,e:"直近12ヶ月で3回高額療養費を受けると4回目から限度額が下がる(区分ウは93,000円)。通常は限度に届かない月(3割<限度)でも対象になる。",s:"2025-1 Q33(後退)"},
 {id:"L52",t:2,q:"2024年10月改正後の児童手当で、第3子以降(月30,000円)をカウントする際に数える子は？",c:["18歳到達後最初の3/31までの子のみ","22歳到達後最初の3/31までで親等に経済的負担のある子も含む","20歳未満の子のみ","支給対象の高校生年代までの子のみ"],a:1,e:"第3子カウントには22歳到達年度までの子(親等に経済的負担)を含む。大学生の長子も1人と数えるため下の子が第3子以降になりやすい。支給対象自体は高校生年代まで。",s:"2025-1 Q4(後退)"},
 {id:"L53",t:2,q:"キャッシュフロー表で、同一の欄に複数項目を計上する場合の変動率の扱いは(問題指定)？",c:["各項目を別々に変動させてから合計","合計額に変動率を適用","変動率は適用しない","最大の項目の変動率を使う"],a:1,e:"留意事項により同一欄に複数項目があるときは合計額に変動率を適用。将来値=現在値×(1+変動率)ⁿ、貯蓄残高=前年残高×(1+運用率)±当年収支。",s:"2025-1 Q5(後退)"},
 {id:"L54",t:2,q:"健康保険・厚生年金の標準報酬月額の改定について正しいのは？",c:["定時決定は7月分から適用","随時改定は著しい高低が生じた月の翌月から","育休終了時改定は終了日翌日から3ヶ月経過後","随時改定は変動月から適用"],a:1,e:"定時決定(4-6月の報酬)は9月から。随時改定は固定的賃金変動後3ヶ月の平均で、著しい高低が生じた月の翌月から。育休終了時改定は終了日翌日から2ヶ月経過後の翌月。",s:"2025-1 Q27(後退)"},
 {id:"L55",t:2,q:"遺族厚生年金・遺族基礎年金について正しいのは？",c:["子のない妻にも5年間遺族基礎年金が出る","死亡当時に妻・子・母がいる場合、母には遺族厚生年金は支給されない","遺族基礎年金の子が祖父母の養子になると受給権が消滅する","父への遺族厚生年金は65歳まで支給停止"],a:1,e:"遺族厚生の順位は配偶者・子>父母>孫>祖父母。妻・子がいれば母には出ない。遺族基礎は子のある配偶者・子が対象(子のない妻に出ない)。子は直系血族(祖父母)の養子では失権しない。",s:"2025-1 Q39(後退)"},
 {id:"L56",t:2,q:"国民年金基金について誤っているのは？",c:["加入員が第2号・第3号被保険者になると資格を喪失","保険料免除を受けると原則資格を喪失","任意脱退でき脱退一時金が支給される","受給前死亡で遺族に遺族一時金が支給される"],a:2,e:"国民年金基金は任意脱退できず脱退一時金もない(掛金は将来年金に据置)。第2号・第3号化や保険料免除では資格喪失。終身年金の保証期間中死亡は遺族一時金あり。",s:"2025-1 Q44(後退)"},
 {id:"L57",t:2,q:"介護休業給付金の休業開始時賃金日額の計算で、分母(割る数)は？",c:["休業期間の暦日数","180(直前6ヶ月の賃金総額÷180)","休業日数","365"],a:1,e:"賃金日額=直前6ヶ月の賃金総額(賞与除く)÷180。暦日数(例182日)で割らない。賃金日額上限と支給額上限の2段階あり。労災の給付基礎日額は暦日数で割る点と区別。",s:"2025-1 Q16(後退・計算)"},
 {id:"L59",t:1,q:"日本政策金融公庫の教育一般貸付について正しいのは？",c:["保証料は元金据置期間の有無にかかわらず一定額","元金据置期間があると保証料は変わる／子2人以内+自宅外通学者ありで世帯年収上限が緩和","自宅外通学の融資限度は一律350万円","元金据置期間は返済期間に含まれない"],a:1,e:"扶養する子2人以内+自宅外通学(予定)者ありで世帯年収(所得)上限が緩和。保証料は据置期間の有無で変わる。自宅外通学・海外留学・大学院等は限度450万(通常350万)。据置期間も返済期間(最長18年)に含む。",s:"2025-2 Q14(2周目も誤答)★継続失点"},
 {id:"L60",t:1,q:"企業型確定拠出年金（企業型DC）について正しいのは？",c:["老齢給付金の受給権を有する者も加入者になれる","掛金は月単位のほか賞与時期のみの拠出も可能","受給開始の上限年齢は70歳","マッチング拠出をしていてもiDeCoに併用加入し拠出できる"],a:1,e:"掛金は賞与時期のみの拠出も可（正肢）。老齢給付金の受給権者は再加入できない。受給開始上限は75歳。マッチング拠出を選択している場合iDeCo併用不可（選択制）。",s:"2025-2 Q42(2周目も誤答)★DC継続弱点"},
 {id:"L61",t:1,q:"2024年10月改正後の児童手当について正しいのは？",c:["支給対象は15歳到達後最初の3/31まで","親等の所得が一定額以上だと支給制限される","支給は偶数月（年6回）に前月分まで／所得制限は撤廃／18歳到達年度末まで支給","支給は毎年2月に年1回まとめて支給される"],a:2,e:"2024.10改正で①所得制限撤廃②高校生年代(18歳到達年度末)まで拡充③支給を年6回(偶数月)に。第3子以降は月30,000円(第3子カウントは22歳年度末までの子を含む)。",s:"2025-2 Q4(2周目後退・改正)"},
 {id:"L62",t:2,q:"老齢厚生年金の加給年金額・振替加算について正しいのは？",c:["受給権取得時に厚年240月未満で加給がつかなくても、在職定時改定で240月以上になれば翌月分から加給が加算される","夫に加給年金がある場合、妻が老齢基礎を繰上げ請求すると夫の加給が支給停止される","妻が夫より年上の場合、妻の老齢基礎に振替加算は行われない","振替加算が加算された妻が夫と離婚すると振替加算は加算されなくなる"],a:0,e:"①240月未満→在職定時改定で240月以上→翌月分から加給加算(正)。②妻の繰上げでは夫の加給は止まらない。③妻が年上でも振替加算は行われる。④いったん加算された振替加算は離婚しても継続(消えない)。加給→妻65歳で振替加算にバトンタッチ。",s:"2025-2 Q36(迷った論点・正答)"},
],
"不動産":[
 {id:"F1",t:1,q:"不動産取得税が課税されるのは次のうちどれか？",c:["相続による取得","贈与による取得","法人の合併による取得","包括遺贈による取得"],a:1,e:"相続・合併・包括遺贈は非課税。贈与は課税。「相続は非課税／贈与は課税」が頻出。",s:"取得税"},
 {id:"F2",t:1,q:"店舗（住宅以外の家屋）を取得した場合の不動産取得税の税率は？",c:["3%","4%","1.5%","2%"],a:1,e:"特例税率3%は土地・住宅。住宅以外の家屋（店舗・事務所）は本則4%。",s:"取得税"},
 {id:"F3",t:1,q:"宅地を取得した場合の不動産取得税の課税標準は？",c:["固定資産税評価額×1/2","固定資産税評価額×1/6","固定資産税評価額×1/3","固定資産税評価額そのまま"],a:0,e:"宅地は課税標準が価格×1/2（2027/3/31まで）。固定資産税の1/6・1/3と混同しない。",s:"取得税"},
 {id:"F4",t:1,q:"固定資産税の納税義務者は？",c:["毎年1月1日時点の登記簿上の所有者","毎年4月1日時点の所有者","その年に取得した者","賦課期日時点の使用者"],a:0,e:"1月1日（賦課期日）時点の登記簿上の所有者。年の途中で売却しても納税義務者は1/1所有者。",s:"固定資産税"},
 {id:"F5",t:1,q:"小規模住宅用地（200㎡以下の部分）の固定資産税の課税標準は？",c:["価格×1/6","価格×1/3","価格×1/2","価格そのまま"],a:0,e:"小規模住宅用地（200㎡以下）＝1/6、一般住宅用地（200㎡超部分）＝1/3。取得税の宅地1/2と区別。",s:"固定資産税"},
 {id:"F6",t:1,q:"住宅取得に係る抵当権設定登記の登録免許税の軽減税率は？",c:["0.4%","0.1%","0.15%","0.3%"],a:1,e:"抵当権設定の本則0.4%、住宅特例0.1%。所有権保存の住宅特例は0.15%、建物移転は0.3%。",s:"登録免許税"},
 {id:"F7",t:1,q:"不動産の贈与契約書に係る印紙税は？",c:["非課税","記載金額のない契約書として1通200円課税","記載金額に応じた階段税率で課税","一律1万円課税"],a:1,e:"贈与契約書は「記載金額なし」扱いで200円課税。建物賃貸借契約書は非課税（土地賃貸借は課税）。",s:"印紙税"},
 {id:"F8",t:1,q:"居住用財産を譲渡した場合の3,000万円特別控除について正しいのは？",c:["所有期間10年超が必要","所有期間の要件はない","配偶者への譲渡にも適用できる","住宅ローン控除と併用できる"],a:1,e:"3,000万円控除に所有期間要件はない（軽減税率の特例は10年超）。配偶者等への譲渡は不可、住宅ローン控除と併用不可。",s:"譲渡特例"},

/* ===== localStorage（累積の苦手・ベスト） ===== */
const MISS_KEY="cfpquiz_miss_v1", BEST_KEY="cfpquiz_best_v1";
function loadJSON(k){try{return JSON.parse(localStorage.getItem(k))||{}}catch(e){return {}}}
function saveJSON(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
function missMap(){return loadJSON(MISS_KEY)}
function missOf(sub,id){const m=missMap();return (m[sub]&&m[sub][id])||0}
function bumpMiss(sub,id,d){const m=missMap();m[sub]=m[sub]||{};m[sub][id]=Math.max(0,(m[sub][id]||0)+d);if(m[sub][id]===0)delete m[sub][id];saveJSON(MISS_KEY,m)}
function weakCount(sub){const m=missMap();return m[sub]?Object.keys(m[sub]).length:0}
function bestOf(sub){const b=loadJSON(BEST_KEY);return b[sub]}
function setBest(sub,n){const b=loadJSON(BEST_KEY);b[sub]=n;saveJSON(BEST_KEY,b)}

/* ===== 出題ロジック ===== */
let SUB="", pool=[], idx=0, score=0, wrong=[], answered=false, mode="";

function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function weightOf(sub,q){ return TIER_BASE[q.t] * (1 + MISS_BOOST*missOf(sub,q.id)); }

// 重み付き非復元抽出（ティア優先＋苦手ブースト）
function weightedSample(sub, items, n){
  const p = items.map(it=>({it,w:weightOf(sub,it)}));
  const res=[];
  while(res.length<n && p.length){
    const total=p.reduce((s,x)=>s+x.w,0);
    let r=Math.random()*total, k=0;
    while(k<p.length-1 && r>p[k].w){ r-=p[k].w; k++; }
    res.push(p[k].it); p.splice(k,1);
  }
  // 出題順は優先順位（ティア昇順）で。同ティア内はシャッフル
  return res.sort((a,b)=> a.t-b.t || (Math.random()-.5));
}

function startSession(sub){
  SUB=sub; mode="session";
  const items=DATA[sub];
  pool = weightedSample(sub, items, Math.min(SESSION_SIZE, items.length));
  idx=0; score=0; wrong=[]; render();
}
function startWeak(sub){
  SUB=sub; mode="weak";
  const m=missMap()[sub]||{};
  const items=DATA[sub].filter(q=>m[q.id]>0).sort((a,b)=>(m[b.id]-m[a.id])||(a.t-b.t));
  if(!items.length){ home(); return; }
  pool=items.slice(0, SESSION_SIZE);
  idx=0; score=0; wrong=[]; render();
}

  const subs=Object.keys(DATA);

   <span style="color:var(--sub);font-size:13px">出題は第1ティア優先のランダム。間違えた問題は次回以降の出題優先度が上がり、累積で「苦手だけ」復習もできます。</span></p></div>
   ${subs.map(s=>{
     const best=bestOf(s), wc=weakCount(s), n=DATA[s].length;
     return `<div class="card subcard" onclick="subjectMenu('${s}')">
        <h2>${s} <span class="chip">全${n}問</span>${wc?`<span class="badge">苦手 ${wc}</span>`:''}</h2>
        <div style="color:var(--sub);font-size:13px">1回30問（プール${n}問から優先度抽出）${best!=null?` ・ 自己ベスト ${best}/${Math.min(SESSION_SIZE,n)}`:''}</div>
     </div>`;
   }).join('')}
   <div class="card" style="font-size:13px;color:var(--sub)">
     <b style="color:var(--txt)">ティアの意味</b><br>
     <span class="tier t1">第1</span> 繰り返し失点の継続弱点・改正・計算事故（最優先で多く出る）<br>
     <span class="tier t2">第2</span> 模試・過去問で集中失点した重要論点<br>
     <span class="tier t3">第3</span> 克服傾向だが油断すると落とす定着確認
   </div>`;
}

function subjectMenu(s){
  const wc=weakCount(s), n=DATA[s].length;
  app.innerHTML = `
   <div class="meta"><span><a href="#" onclick="home();return false;">← 科目選択へ</a></span><span>${s}</span></div>
   <div class="card">
     <h2 style="margin:0 0 10px">${s}</h2>
     <button class="btn primary" onclick="startSession('${s}')">30問にチャレンジ（優先度ランダム）</button>
     <button class="btn" onclick="startWeak('${s}')" ${wc?'':'disabled style="opacity:.45"'}>苦手だけ復習${wc?`（${wc}問）`:'（なし）'}</button>
     <button class="btn ghost" onclick="if(confirm('${s}の苦手記録をリセットします。よろしいですか？')){clearWeak('${s}')}">${s}の苦手記録をリセット</button>
   </div>
   <div class="card" style="font-size:13px;color:var(--sub)">プール全${n}問。第1ティアほど高確率で出題され、過去に間違えた問題は優先度が上がります。</div>`;
}
function clearWeak(s){const m=missMap();delete m[s];saveJSON(MISS_KEY,m);subjectMenu(s);}

function render(){
  const q=pool[idx]; answered=false;
  const pct=Math.round(idx/pool.length*100);
  app.innerHTML = `
   <div class="meta">
     <span>${SUB}　第 ${idx+1} / ${pool.length} 問${mode==='weak'?'（苦手復習）':''}</span>
     <span class="tier ${TIER_CLASS[q.t]}">${TIER_LABEL[q.t]}</span>
   </div>
   <div class="bar"><i style="width:${pct}%"></i></div>
   <div class="card">
     <div class="qtext">${q.q}</div>
     <div id="choices">${q.c.map((c,i)=>`<button class="btn" onclick="answer(${i})"><span class="num">${i+1}</span>${c}</button>`).join('')}</div>
     <div id="fb"></div><div id="nextWrap"></div>
   </div>
   <div class="meta"><span>正解 ${score}</span><span><a href="#" onclick="quit();return false;">中断</a></span></div>`;
}

function answer(i){
  if(answered)return; answered=true;
  const q=pool[idx], correct=q.a, isOk=(i===correct);
  document.querySelectorAll('#choices .btn').forEach((b,bi)=>{b.disabled=true;
    if(bi===correct)b.classList.add('ok'); if(bi===i&&!isOk)b.classList.add('ng');});
  if(isOk){ score++; bumpMiss(SUB,q.id,-1); }      // 正解：苦手度を下げる
  else { wrong.push({q:q.q,you:q.c[i],cor:q.c[correct],e:q.e,s:q.s}); bumpMiss(SUB,q.id,+1); } // 不正解：優先度UP
  document.getElementById('fb').innerHTML =
    `<div class="fb ${isOk?'ok':'ng'}"><b>${isOk?'◯ 正解':'✗ 不正解'}</b>　正解は <b>${correct+1}. ${q.c[correct]}</b><br>${q.e}<div class="src">論点：${q.s}</div></div>`;
  document.getElementById('nextWrap').innerHTML =
    `<button class="btn primary" onclick="next()">${idx+1<pool.length?'次の問題 →':'結果を見る'}</button>`;
}
function next(){ idx++; if(idx<pool.length)render(); else result(); }
function quit(){ if(confirm('中断して科目メニューに戻りますか？'))subjectMenu(SUB); }

function result(){
  const pctScore=Math.round(score/pool.length*100);
  if(mode==='session' && pool.length===Math.min(SESSION_SIZE,DATA[SUB].length)){
    const b=bestOf(SUB); if(b==null||score>b)setBest(SUB,score);
  }
  const msg=pctScore>=90?'素晴らしい！取りこぼしなし。':pctScore>=70?'good。間違えた論点を復習しましょう。':'弱点が明確。苦手だけ復習が有効です。';
  const wrongHtml=wrong.length?wrong.map(w=>`
     <div class="rev"><div class="q">${w.q}</div>
       <div class="a"><span class="cor">正：${w.cor}</span> ／ <span class="you">あなた：${w.you}</span><br>${w.e}<br><span style="font-size:12px">論点：${w.s}</span></div></div>`).join('')
     :'<p class="center" style="color:var(--ok)">全問正解！👏</p>';
  app.innerHTML=`
   <div class="card center">
     <div class="big">${score}<span style="font-size:22px;color:var(--sub)"> / ${pool.length}</span></div>
     <div style="color:var(--sub)">正答率 ${pctScore}%　（${SUB}）</div><p>${msg}</p>
     <div class="row">
       <button class="btn primary" onclick="startSession('${SUB}')">もう一度（30問）</button>
       ${weakCount(SUB)?`<button class="btn" onclick="startWeak('${SUB}')">苦手だけ復習（${weakCount(SUB)}）</button>`:''}
     </div>
     <button class="btn ghost" onclick="home()">科目選択へ戻る</button>
   </div>
   <div class="card"><b>${wrong.length?'復習（間違えた問題）':'結果'}</b>${wrongHtml}</div>`;
}

home();
</script>
</body>
</html>
