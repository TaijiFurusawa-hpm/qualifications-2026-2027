/* ===== localStorage（累積の苦手・ベスト） ===== */
const MISS_KEY="cfpquiz_miss_v1", BEST_KEY="cfpquiz_best_v1";
function loadJSON(k){try{return JSON.parse(localStorage.getItem(k))||{}}catch(e){return {}}}
function saveJSON(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
function missMap(){return loadJSON(MISS_KEY)}
function missOf(sub,id){const m=missMap();return (m[sub]&&m[sub][id])||0}
function bumpMiss(sub,id,d){const m=missMap();m[sub]=m[sub]||{};m[sub][id]=Math.max(0,(m[sub][id]||0)+d);if(m[sub][id]===0)delete m[sub][id];saveJSON(MISS_KEY,m)}
function weakCount(sub){const m=missMap();return m[sub]?Object.keys(m[sub]).length:0}
function bestOf(sub){const b=loadJSON(BEST_KEY);return b[sub]}
function setBest(sub,n){const b=loadJSON(BEST_KEY);b[sub]=n;saveJSON(BEST_KEY,b)}

/* ===== 出題ロジック ===== */
let SUB="", pool=[], idx=0, score=0, wrong=[], answered=false, mode="";

function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function weightOf(sub,q){ return TIER_BASE[q.t] * (1 + MISS_BOOST*missOf(sub,q.id)); }

// 重み付き非復元抽出（ティア優先＋苦手ブースト）
function weightedSample(sub, items, n){
  const p = items.map(it=>({it,w:weightOf(sub,it)}));
  const res=[];
  while(res.length<n && p.length){
    const total=p.reduce((s,x)=>s+x.w,0);
    let r=Math.random()*total, k=0;
    while(k<p.length-1 && r>p[k].w){ r-=p[k].w; k++; }
    res.push(p[k].it); p.splice(k,1);
  }
  // 出題順は優先順位（ティア昇順）で。同ティア内はシャッフル
  return res.sort((a,b)=> a.t-b.t || (Math.random()-.5));
}

function startSession(sub){
  SUB=sub; mode="session";
  const items=DATA[sub];
  pool = weightedSample(sub, items, Math.min(SESSION_SIZE, items.length));
  idx=0; score=0; wrong=[]; render();
}
function startWeak(sub){
  SUB=sub; mode="weak";
  const m=missMap()[sub]||{};
  const items=DATA[sub].filter(q=>m[q.id]>0).sort((a,b)=>(m[b.id]-m[a.id])||(a.t-b.t));
  if(!items.length){ home(); return; }
  pool=items.slice(0, SESSION_SIZE);
  idx=0; score=0; wrong=[]; render();
}

  heart:'<path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/><path d="M3.22 12H9.5l.5-1 2 4.5 2-7 1.5 3.5h5.27"/>',
  building:'<path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/>',
  layers:'<path d="m12.8 2.2a2 2 0 0 0-1.6 0L2.6 6.1a1 1 0 0 0 0 1.8l8.6 3.9a2 2 0 0 0 1.6 0l8.6-3.9a1 1 0 0 0 0-1.8Z"/><path d="m22 17.6-9.2 4.2a2 2 0 0 1-1.6 0L2 17.6"/><path d="m22 12.6-9.2 4.2a2 2 0 0 1-1.6 0L2 12.6"/>',
  reset:'<path d="M3 12a9 9 0 1 0 9-9 9.8 9.8 0 0 0-6.7 2.7L3 8"/><path d="M3 3v5h5"/>',
  back:'<path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>',
  chev:'<path d="m9 18 6-6-6-6"/>',
  check:'<path d="M20 6 9 17l-5-5"/>',
  x:'<path d="M18 6 6 18"/><path d="m6 6 12 12"/>',
  refresh:'<path d="M21 12a9 9 0 1 1-2.6-6.4L21 8"/><path d="M21 3v5h-5"/>',
  trophy:'<path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.7V17c0 .6-.5 1-1 1.2C7.9 18.8 7 20.2 7 22"/><path d="M14 14.7V17c0 .6.5 1 1 1.2 1.1.6 2 2 2 4.8"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>',
  info:'<circle cx="12" cy="12" r="9"/><path d="M12 16v-4"/><path d="M12 8h.01"/>',
  flag:'<path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><path d="M4 22v-7"/>',
  receipt:'<path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1Z"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 17.5v-11"/>'
};
const SUBJECT_ICON={"ライフ":"heart","不動産":"building","タックス":"receipt"};
function ic(n,s){s=s||18;return `<svg class="ic" width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS[n]||''}</svg>`;}
function countUp(el,to,dur){dur=dur||700;const t0=performance.now();(function f(t){let p=Math.min(1,(t-t0)/dur);p=1-Math.pow(1-p,3);el.textContent=Math.round(to*p);if(p<1)requestAnimationFrame(f);})(t0);}
function animBar(pct){requestAnimationFrame(()=>{const b=document.querySelector('.bar>i');if(b)b.style.width=pct+'%';});}

/* ===== 画面 ===== */
const app=document.getElementById('app');

function home(){
  SUB="";
  const subs=Object.keys(DATA);
  app.innerHTML = `
   <div class="card" style="padding:14px 16px"><p style="margin:0;font-size:13.5px">科目を選んでスタート。回答後すぐに正誤と解説が出ます。<br>
   <span style="color:var(--sub);font-size:12.5px">第1ティア優先のランダム出題。間違えた問題は次回以降の優先度が上がります。</span></p></div>
   ${subs.map((s,si)=>{
     const best=bestOf(s), wc=weakCount(s), n=DATA[s].length, max=Math.min(SESSION_SIZE,n);
     return `<div class="card subcard" onclick="subjectMenu('${s}')">
        <div class="stile s${si%2}">${ic(SUBJECT_ICON[s]||'target',22)}</div>
        <div style="flex:1;min-width:0">
          <h2>${s}${wc?`<span class="badge">苦手 ${wc}</span>`:''}</h2>
          <div class="scard-meta"><span>全${n}問</span><span class="dot"></span><span>1回30問・優先度抽出</span>${best!=null?`<span class="dot"></span><span>ベスト <b style="font-family:var(--num);color:var(--ink)">${best}</b>/${max}</span>`:''}</div>
          ${best!=null?`<div class="mini"><i style="width:${Math.round(best/max*100)}%"></i></div>`:''}
        </div>
        <span class="chev">${ic('chev',18)}</span>
     </div>`;
   }).join('')}
   <div class="card" style="font-size:13px;color:var(--sub)">
     <b style="color:var(--ink);display:inline-flex;align-items:center">${ic('info',16)}ティアの意味</b><br>
     <span class="tier t1">第1</span> 繰り返し失点の継続弱点・改正・計算事故（最優先で多く出る）<br>
     <span class="tier t2">第2</span> 模試・過去問で集中失点した重要論点<br>
     <span class="tier t3">第3</span> 克服傾向だが油断すると落とす定着確認
   </div>`;
}

function subjectMenu(s){
  const wc=weakCount(s), n=DATA[s].length, best=bestOf(s), max=Math.min(SESSION_SIZE,n);
  const tc={1:0,2:0,3:0}; DATA[s].forEach(q=>tc[q.t]++);
  const si=Object.keys(DATA).indexOf(s);
  app.innerHTML = `
   <div class="meta"><span><a href="#" onclick="home();return false;">${ic('back',15)}科目選択へ</a></span><span>${s}</span></div>
   <div class="card">
     <div style="display:flex;align-items:center;gap:12px;margin-bottom:4px">
       <div class="stile s${si%2}" style="width:40px;height:40px;flex-basis:40px;border-radius:11px">${ic(SUBJECT_ICON[s]||'target',19)}</div>
       <h2 style="margin:0">${s}</h2>
     </div>
     <div class="kpis">
       <div class="kpi"><b>${n}</b><small>Pool</small></div>
       <div class="kpi ${wc?'warn':''}"><b>${wc}</b><small>Weak</small></div>
       <div class="kpi accent"><b>${best!=null?best:'–'}</b><small>Best /${max}</small></div>
     </div>
     <div class="dist">
       <i style="width:${tc[1]/n*100}%;background:linear-gradient(90deg,rgba(251,113,133,.9),rgba(251,113,133,.55))"></i>
       <i style="width:${tc[2]/n*100}%;background:linear-gradient(90deg,rgba(251,191,36,.85),rgba(251,191,36,.5))"></i>
       <i style="width:${tc[3]/n*100}%;background:linear-gradient(90deg,rgba(52,211,153,.85),rgba(52,211,153,.5))"></i>
     </div>
     <div class="legend">
       <span><i style="background:#fb7185"></i>第1 ${tc[1]}</span>
       <span><i style="background:#fbbf24"></i>第2 ${tc[2]}</span>
       <span><i style="background:#34d399"></i>第3 ${tc[3]}</span>
     </div>
     <div style="height:14px"></div>
     <button class="btn primary" onclick="startSession('${s}')">${ic('play',16)}30問にチャレンジ（優先度ランダム）</button>
     <button class="btn" onclick="startWeak('${s}')" ${wc?'':'disabled style="opacity:.45"'}>${ic('flame',17)}苦手だけ復習${wc?`（${wc}問）`:'（なし）'}</button>
     <button class="btn ghost" onclick="if(confirm('${s}の苦手記録をリセットします。よろしいですか？')){clearWeak('${s}')}">${ic('reset',16)}苦手記録をリセット</button>
   </div>`;
}
function clearWeak(s){const m=missMap();delete m[s];saveJSON(MISS_KEY,m);subjectMenu(s);}

function render(){
  const q=pool[idx]; answered=false;
  const pct=Math.round(idx/pool.length*100);
  const pad=n=>String(n).padStart(2,'0');
  app.innerHTML = `
   <div class="meta">
     <span class="qno">${SUB}${mode==='weak'?'・苦手復習':''}　<b>${pad(idx+1)}</b><i>/${pad(pool.length)}</i></span>
     <span class="tier ${TIER_CLASS[q.t]}">${TIER_LABEL[q.t]}</span>
   </div>
   <div class="bar"><i></i></div>
   <div class="card">
     <div class="qtext">${q.q}</div>
     <div id="choices">${q.c.map((c,i)=>`<button class="btn pop" style="animation-delay:${i*60}ms" onclick="answer(${i})"><span class="num">${i+1}</span>${c}</button>`).join('')}</div>
     <div id="fb"></div><div id="nextWrap"></div>
   </div>
   <div class="meta"><span class="qno">正解 <b style="color:var(--ok)">${score}</b></span><span><a href="#" onclick="quit();return false;">${ic('flag',15)}中断</a></span></div>`;
  animBar(pct);
}

function answer(i){
  if(answered)return; answered=true;
  const q=pool[idx], correct=q.a, isOk=(i===correct);
  document.querySelectorAll('#choices .btn').forEach((b,bi)=>{b.disabled=true;
    if(bi===correct)b.classList.add('ok'); if(bi===i&&!isOk)b.classList.add('ng');});
  if(isOk){ score++; bumpMiss(SUB,q.id,-1);          // 正解：苦手度を下げる＋Cyanグロー
    const c=document.querySelector('.card'); if(c){c.classList.remove('glow'); void c.offsetWidth; c.classList.add('glow');} }
  else { wrong.push({q:q.q,you:q.c[i],cor:q.c[correct],e:q.e,s:q.s}); bumpMiss(SUB,q.id,+1); } // 不正解：優先度UP
  document.getElementById('fb').innerHTML =
    `<div class="fb ${isOk?'ok':'ng'}">
      <div class="fbh"><span class="fbi">${ic(isOk?'check':'x',14)}</span>${isOk?'正解':'不正解'}</div>
      <div class="ans">正解は <b>${correct+1}. ${q.c[correct]}</b></div>
      <div class="exp">${q.e}<div class="src">論点：${q.s}</div></div>
    </div>`;
  document.getElementById('nextWrap').innerHTML =
    `<button class="btn primary" onclick="next()">${idx+1<pool.length?'次の問題':'結果を見る'}<svg class="ic" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="margin:0 0 0 7px">${ICONS.chev}</svg></button>`;
}
function next(){ idx++; if(idx<pool.length)render(); else result(); }
function quit(){ if(confirm('中断して科目メニューに戻りますか？'))subjectMenu(SUB); }

function result(){
  const pctScore=Math.round(score/pool.length*100);
  let newBest=false;
  if(mode==='session' && pool.length===Math.min(SESSION_SIZE,DATA[SUB].length)){
    const b=bestOf(SUB); if(b==null||score>b){ setBest(SUB,score); newBest=(b!=null); }
  }
  const msg=pctScore>=90?'素晴らしい！取りこぼしなし。':pctScore>=70?'good。間違えた論点を復習しましょう。':'弱点が明確。苦手だけ復習が有効です。';
  const wrongHtml=wrong.length?wrong.map(w=>`
     <div class="rev"><div class="q">${w.q}</div>
       <div class="a"><span class="cor">正：${w.cor}</span> ／ <span class="you">あなた：${w.you}</span><br>${w.e}<br><span style="font-size:12px">論点：${w.s}</span></div></div>`).join('')
     :`<p class="center" style="color:var(--ok);display:flex;align-items:center;justify-content:center;gap:6px">${ic('trophy',20)}全問正解！お見事です。</p>`;
  const R=66, C=(2*Math.PI*R).toFixed(1);
  app.innerHTML=`
   <div class="card center">
     <div class="ring">
       <svg width="158" height="158" viewBox="0 0 158 158">
         <defs><linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
           <stop offset="0" stop-color="#0ea5b7"/><stop offset=".55" stop-color="#22d3ee"/><stop offset="1" stop-color="#a78bfa"/>
         </linearGradient></defs>
         <circle class="trk" cx="79" cy="79" r="${R}"/>
         <circle class="val" id="ringVal" cx="79" cy="79" r="${R}" stroke-dasharray="${C}" stroke-dashoffset="${C}"/>
       </svg>
       <div class="ctr">
         <div class="big" style="font-size:38px;margin:0"><span id="bigN">0</span><span style="font-size:17px;color:var(--sub);-webkit-text-fill-color:var(--sub)">/${pool.length}</span></div>
         <div style="font-family:var(--num);font-size:10px;font-weight:600;letter-spacing:2px;color:var(--faint)">SCORE</div>
       </div>
     </div>
     ${newBest?`<div class="newbest">${ic('trophy',13)}自己ベスト更新！</div>`:''}
     <div class="kpis">
       <div class="kpi accent"><b>${pctScore}<span style="font-size:13px">%</span></b><small>正答率</small></div>
       <div class="kpi"><b>${score}</b><small>正解</small></div>
       <div class="kpi ${wrong.length?'warn':''}"><b>${wrong.length}</b><small>ミス</small></div>
     </div>
     <p style="margin:10px 0 14px">${msg}</p>
     <div class="row">
       <button class="btn primary" onclick="startSession('${SUB}')">${ic('refresh')}もう一度（30問）</button>
       ${weakCount(SUB)?`<button class="btn" onclick="startWeak('${SUB}')">${ic('flame',17)}苦手だけ復習（${weakCount(SUB)}）</button>`:''}
     </div>
     <button class="btn ghost" onclick="home()">${ic('back',16)}科目選択へ戻る</button>
   </div>
   <div class="card"><b style="display:inline-flex;align-items:center">${ic(wrong.length?'flag':'trophy',17)}${wrong.length?'復習（間違えた問題）':'結果'}</b>${wrongHtml}</div>`;
  const bn=document.getElementById('bigN'); if(bn)countUp(bn,score,1100);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const rv=document.getElementById('ringVal'); if(rv)rv.style.strokeDashoffset=(C*(1-score/pool.length)).toFixed(1);
  }));
}

home();

/* Service Worker 登録（オフライン対応） */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
